<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <meta property="og:title" content="深呼吸する森">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://chiaki-mil.github.io/shinkokyuu-mori/">
  <meta property="og:image" content="https://chiaki-mil.github.io/shinkokyuu-mori/apple-touch-icon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="深呼吸する森">
  <meta name="twitter:description" content="深呼吸する言葉は、橘川幸夫が自分の人生の局面で、考えたり感じたりしたことを、短い文章に結晶化したものです。">
  <meta name="twitter:image" content="https://chiaki-mil.github.io/shinkokyuu-mori/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深呼吸する森</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="512x512" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="深呼吸する森">
  <meta name="theme-color" content="#08130a">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700&family=Noto+Serif+JP:wght@300;400&family=Zen+Old+Mincho:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100%;
  font-family: 'Shippori Mincho B1', 'Noto Serif JP', serif;
  overflow-x: hidden;
  background: #08130a;
}

/* ── 森の背景レイヤー ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    linear-gradient(rgba(4,10,5,0.18), rgba(4,10,5,0.32)),
    url('main-bg-sp.jpg') center/cover no-repeat;
  pointer-events: none;
}
@media (min-width: 768px) {
  body::before {
    background:
      linear-gradient(rgba(4,10,5,0.18), rgba(4,10,5,0.32)),
      url('main-bg-pc.jpg') center/cover no-repeat;
  }
}

/* ── 霧のアニメーション ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 120% 25% at 50% 88%, rgba(180,220,160,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 80% 15% at 30% 75%, rgba(160,210,140,0.03) 0%, transparent 50%);
  animation: mistDrift 18s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes mistDrift {
  0%   { transform: translateX(-15px) translateY(0); opacity: 0.8; }
  100% { transform: translateX(15px)  translateY(-8px); opacity: 1; }
}

.light-particles {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--particle-color);
  border-radius: 50%;
  animation: float linear infinite;
}

@keyframes float {
  0%   { transform: translateY(0) translateX(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-80vh) translateX(20px); opacity: 0; }
}

#app {
  position: relative; z-index: 1;
  height: 100dvh;
  display: flex;
  padding: 4.51dvh 6.71cqw;
  color: #d6eacc;
  container-type: inline-size;
  max-width: 480px;
  margin: 0 auto;
}

/* ── ガラスカード（Figmaデザインに準拠した絶対配置レイアウト） ── */
.glass-card {
  position: relative;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 5.28cqw;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* ── メニューボタン ── */
.menu-btn {
  position: absolute;
  top: 2.83%; right: 8%;
  width: 9.17cqw; height: 9.17cqw;
  max-width: 36px; max-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: rgba(255,255,255,0.9);
  cursor: pointer;
  padding: 0;
  transition: color 0.3s;
  z-index: 6;
}
.menu-btn svg { width: 100%; height: 100%; }
.menu-btn:hover, .menu-btn.active { color: #fff; }

/* ── フルパネルスライドメニュー ── */
.menu-nav {
  position: absolute;
  inset: 0;
  z-index: 5;
  background: rgba(6, 14, 7, 0.95);
  backdrop-filter: blur(18px);
  border-radius: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 18%;
  clip-path: inset(0 0 100% 0);
  transition: clip-path 0.42s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
.menu-nav.open {
  clip-path: inset(0 0 0% 0);
  pointer-events: auto;
}
.menu-nav-list {
  list-style: none;
  width: 80%;
  display: flex;
  flex-direction: column;
}
.menu-nav-item + .menu-nav-item {
  border-top: 1px solid rgba(255,255,255,0.12);
}
.menu-nav-btn {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 3.5cqw;
  width: 100%;
  background: none;
  border: none;
  padding: 5% 0;
  font-family: inherit;
  font-size: clamp(0.9rem, 4cqw, 1.2rem);
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.85);
  cursor: pointer;
  transition: color 0.2s;
}
.menu-nav-btn:hover { color: #fff; }
.menu-nav-btn svg {
  width: clamp(1rem, 4.5cqw, 1.3rem);
  height: clamp(1rem, 4.5cqw, 1.3rem);
  flex-shrink: 0;
}

/* ── メニューSNSセクション ── */
.menu-sns-header {
  cursor: default;
  pointer-events: none;
}
.menu-sns-icons {
  display: flex;
  flex-direction: column;
  gap: 3cqw;
  padding: 3cqw 0 2cqw;
}
.menu-sns-btn {
  display: flex;
  align-items: center;
  gap: 2cqw;
  color: rgba(255,255,255,0.6);
  font-size: clamp(0.9rem, 4.5cqw, 1.3rem);
  letter-spacing: 0.05em;
  transition: color 0.2s;
  text-decoration: none;
}
.menu-sns-btn:hover { color: #fff; }
.menu-sns-btn svg {
  width: clamp(1.3rem, 6cqw, 1.7rem);
  height: clamp(1.3rem, 6cqw, 1.7rem);
  flex-shrink: 0;
}

/* ── 名言ナビ矢印 ── */
.edge-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 6cqw; height: 6cqw;
  max-width: 24px; max-height: 24px;
  display: flex; align-items: center; justify-content: center;
  background: none;
  border: none;
  color: rgba(255,255,255,0.55);
  cursor: pointer;
  transition: color 0.25s;
  z-index: 2;
}
.edge-nav:hover { color: #fff; }
.edge-nav svg { width: 100%; height: 100%; }
.edge-nav--prev { left: 5%; }
.edge-nav--next { right: 4%; }

/* ── Quote section ── */
.date-str {
  position: absolute;
  top: 23.2%; left: 0; right: 0;
  text-align: center;
  font-size: clamp(0.8rem, 2.96cqw, 1.05rem);
  letter-spacing: 0.4em;
  color: rgba(255,255,255,0.5);
}

#q-card {
  position: absolute;
  top: 33.2%; left: 15.7%; right: 12.5%;
}

/* 名言テキスト — くっきり・大きく */
#q-text {
  font-size: clamp(1.05rem, 5.37cqw, 1.7rem);
  font-weight: 500;
  line-height: 1.965;
  letter-spacing: 0.06em;
  color: #ffffff;
  text-align: left;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 1s ease 0.1s, transform 1s ease 0.1s;
  text-shadow: none;
}
#q-text.show { opacity: 1; transform: none; }

/* 著者 */
#q-author {
  margin-top: 12px;
  font-size: 0.72rem;
  letter-spacing: 0.45em;
  color: rgba(140,195,100,0.65);
  opacity: 0;
  transition: opacity 1s ease 0.65s;
}
#q-author.show { opacity: 1; }

/* ── Controls（お気に入り／共有／保存） ── */
.icon-circle {
  position: absolute;
  top: 80%;
  width: 14.54%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.35);
  color: rgba(255,255,255,0.9);
  font-size: clamp(1rem, 4.5cqw, 1.4rem);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
}
.icon-circle:hover {
  color: #fff;
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.16);
}
.icon-circle svg { width: 1.6em; height: 1.6em; }
.icon-circle.fav-on {
  color: #a8e060;
  border-color: rgba(168,224,96,0.6);
  background: rgba(80,140,50,0.18);
}
.icon-circle.fav-on svg { fill: currentColor; }
#fav-btn { left: 17.06%; }
#share-btn { left: 42.78%; }
#save-btn { left: 68.5%; }

/* ── カードフッター ── */
.card-footer {
  position: absolute;
  top: 91.5%; left: 0; right: 0;
  text-align: center;
  font-size: clamp(0.8rem, 2.96cqw, 1.05rem);
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.6);
}

.save-link {
  background: none;
  border: none;
  color: rgba(140,190,100,0.45);
  font-family: 'Shippori Mincho B1', serif;
  font-size: 0.62rem;
  letter-spacing: 0.48em;
  cursor: pointer;
  transition: color 0.3s;
}
.save-link:hover { color: rgba(180,230,130,0.85); }

/* ── Favorites ── */
#fav-sec {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  animation: fadeUp 0.45s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.fav-list {
  display: flex;
  flex-direction: column;
  gap: 4%;
  position: absolute;
  top: 19%; left: 8%; right: 8%; bottom: 9%;
  overflow-y: auto;
  padding-right: 2%;
}
#fav-sec.is-empty .fav-list { display: none; }
.fav-list::-webkit-scrollbar { width: 6px; }
.fav-list::-webkit-scrollbar-track { background: transparent; }
.fav-list::-webkit-scrollbar-thumb { background: #3B4D46; border-radius: 3px; }
.fav-list { scrollbar-color: #3B4D46 transparent; }

.fav-item {
  background: rgba(255,255,255,0.55);
  border-radius: 4.5cqw;
  padding: 6% 7%;
  flex-shrink: 0;
}

.fav-text {
  font-size: clamp(0.8rem, 3.6cqw, 1.05rem);
  line-height: 1.9;
  letter-spacing: 0.06em;
  color: #3d4a3f;
  margin-bottom: 6%;
}

.fav-item-icons {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 6%;
  color: #4a5650;
}
.fav-icon-btn {
  background: none; border: none;
  color: inherit;
  padding: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s;
}
.fav-icon-btn:hover { opacity: 0.6; }
.fav-icon-btn svg { width: clamp(1rem,4.2cqw,1.25rem); height: clamp(1rem,4.2cqw,1.25rem); }
.fav-icon-heart { color: #4a5650; }

/* ── お気に入りが空の場合（Figmaデザイン） ── */
.glass-card.fav-mode {
  background: linear-gradient(160deg, rgba(255,255,255,0.72) 0%, rgba(225,235,222,0.65) 100%);
  backdrop-filter: blur(27px);
  border-color: rgba(255,255,255,0.5);
}

.fav-head {
  display: flex;
  position: absolute;
  top: 11.25%; left: 18.2%;
  align-items: center;
  gap: 2.5cqw;
  color: #7c8c7c;
  z-index: 2;
}
.fav-head svg { width: clamp(1rem,4cqw,1.3rem); height: clamp(1rem,4cqw,1.3rem); fill: currentColor; }
.fav-head-title {
  font-size: clamp(0.85rem,4.28cqw,1.3rem);
  letter-spacing: 0.2em;
}

.fav-close {
  display: flex;
  position: absolute;
  top: 2.55%; right: 8.5%;
  width: 11.76cqw; height: 11.76cqw;
  max-width: 44px; max-height: 44px;
  align-items: center; justify-content: center;
  background: none; border: none;
  color: #8a948c;
  cursor: pointer;
  z-index: 3;
}
.fav-close svg { width: 100%; height: 100%; }

.fav-empty-state {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 8%;
}
#fav-sec.is-empty .fav-empty-state { display: flex; }
.fav-empty-msg {
  font-size: clamp(0.78rem,3.5cqw,1.1rem);
  line-height: 2.6;
  letter-spacing: 0.03em;
  white-space: nowrap;
  color: #4a5650;
  margin-bottom: 8%;
}
.fav-back-btn {
  display: flex;
  align-items: center; justify-content: center;
  gap: 2.5cqw;
  width: 77.5%;
  padding: 4% 0;
  border: 1px solid rgba(74,86,80,0.35);
  background: none;
  color: #4a5650;
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(0.75rem,3.64cqw,1.1rem);
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: background 0.25s;
}
.fav-back-btn:hover { background: rgba(74,86,80,0.08); }
.fav-back-btn svg { width: clamp(0.9rem,4.5cqw,1.4rem); height: clamp(0.9rem,4.5cqw,1.4rem); }

.fav-footer {
  display: block;
  position: absolute;
  bottom: 4.5%; left: 0; right: 0;
  text-align: center;
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(0.7rem,3.42cqw,1rem);
  letter-spacing: 0.2em;
  color: #202320;
}

.glass-card.fav-mode .menu-btn,
.glass-card.fav-mode .menu-nav,
.glass-card.fav-mode .edge-nav {
  display: none;
}

/* ── 解説モーダル ── */
#desc-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 150;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(4,10,5,0.85);
  backdrop-filter: blur(6px);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.desc-box {
  background: linear-gradient(145deg, #0d2010 0%, #0a1a0c 100%);
  border: 1px solid rgba(100,170,60,0.28);
  width: 100%;
  max-width: 520px;
  max-height: 75vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

.desc-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid rgba(100,170,60,0.15);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.desc-title {
  font-size: 0.65rem;
  letter-spacing: 0.45em;
  color: rgba(140,195,100,0.55);
}

.desc-close {
  background: none;
  border: none;
  color: rgba(140,195,100,0.5);
  font-size: 1rem;
  cursor: pointer;
  transition: color 0.2s;
  padding: 2px 6px;
  line-height: 1;
}
.desc-close:hover { color: #d6eacc; }

.desc-body {
  padding: 28px 28px 32px;
  overflow-y: auto;
  flex: 1;
}

.desc-text {
  font-size: 0.95rem;
  line-height: 2.4;
  letter-spacing: 0.06em;
  color: #d6eacc;
  font-weight: 300;
}

/* 解説ボタン */
.desc-btn {
  background: none;
  border: none;
  color: rgba(140,195,100,0.45);
  font-family: 'Shippori Mincho B1', serif;
  font-size: 0.72rem;
  letter-spacing: 0.45em;
  cursor: pointer;
  transition: color 0.3s;
  padding: 0;
  margin-top: 20px;
  display: none;
  width: 100%;
  text-align: center;
}
.desc-btn:hover { color: rgba(180,230,130,0.85); }
.desc-btn.visible { display: block; }

/* ── ローディングアニメーション ── */
#loading-screen {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(rgba(4,12,5,0.15), rgba(4,12,5,0.35)),
    url('bg-sp.jpg') center/cover no-repeat;
  transition: opacity 0.8s ease;
}
@media (min-width: 768px) {
  #loading-screen {
    background:
      linear-gradient(rgba(4,12,5,0.15), rgba(4,12,5,0.35)),
      url('bg-pc.jpg') center/cover no-repeat;
  }
}
}
#loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}
.loading-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 50%;
  border: 1px solid rgba(200,230,170,0.45);
  transform: translate(-50%, -50%) scale(0.9);
  animation: loadingBreathe 4s ease-in-out infinite;
}
.loading-circle--1 {
  width: 33vmin; height: 33vmin;
  animation-delay: 0s;
  border-color: rgba(220,240,190,0.6);
}
.loading-circle--2 {
  width: 50vmin; height: 50vmin;
  animation-delay: 0.3s;
  border-color: rgba(200,230,170,0.4);
}
.loading-circle--3 {
  width: 72vmin; height: 72vmin;
  animation-delay: 0.6s;
  border-color: rgba(180,220,150,0.22);
}
@keyframes loadingBreathe {
  0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
}
.breath-text {
  position: relative;
  z-index: 1;
  writing-mode: vertical-rl;
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(1.0rem, 4.5vmin, 1.4rem);
  line-height: 1.9;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.5);
  text-align: center;
  animation: breatheText 4s ease-in-out infinite;
}
@keyframes breatheText {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 0.7; }
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(8,20,9,0.92);
  border: 1px solid rgba(100,170,60,0.3);
  color: #c8e8a8;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 0.64rem; letter-spacing: 0.28em;
  padding: 12px 28px; opacity: 0;
  pointer-events: none;
  transition: all 0.35s ease;
  z-index: 100; white-space: nowrap;
  backdrop-filter: blur(8px);
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Capture frame (壁紙サイズ 1080x1920) ── */
#cf {
  position: fixed; left: -9999px; top: 0;
  width: 1080px;
  height: 1920px;
  background: #060e07;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-start;
  text-align: left;
  padding: 660px 120px 120px 120px;
  overflow: hidden;
}
#cf::before {
  content: '';
  position: absolute;
  top: -5%; left: -5%; right: -5%; bottom: -5%;
  background: url('save-bg-sp.jpg') center/cover no-repeat;
}
.cf-inner {
  width: 100%;
  position: relative;
  z-index: 1;
}
.cf-name { font-size: 43px; font-family: 'Zen Old Mincho', serif; font-weight: 400; letter-spacing: 0.4em; line-height: 54px; color: rgba(255,255,255,0.5); margin-bottom: 100px; text-align: center; }
.cf-rule { display: none; }
.cf-body { font-family: 'Shippori Mincho B1', serif; font-size: 72px; line-height: 2.4; letter-spacing: 0.13em; color: #ffffff; }
.cf-by { font-size: 1.1rem; letter-spacing: 0.5em; color: rgba(140,195,100,0.6); font-family: 'Shippori Mincho B1', serif; }

/* ── PC Capture frame (壁紙サイズ 1920x1080) ── */
#cf-pc {
  position: fixed; left: -9999px; top: 0;
  width: 1920px;
  height: 1080px;
  background: #060e07;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  text-align: left;
  padding: 0 200px 0 200px;
  overflow: hidden;
}
#cf-pc::before {
  content: '';
  position: absolute;

<script>
/* ── 光の粒を生成 ── */
(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = (60 + Math.random() * 40) + 'vh';
    p.style.width = p.style.height = (1 + Math.random() * 2.5) + 'px';
    p.style.animationDuration = (12 + Math.random() * 20) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.opacity = 0;
    container.appendChild(p);
  }
})();

/* ── Quotes ── */
let QUOTES = [];
let quotesLoaded = false;
let history = [];

async function loadQuotes() {
  const GAS_URL = 'https://script.google.com/macros/s/AKfycby3Lxzf7bo_lFlYSpMmO2g6s9RQ6O4fm1dU9Z6lpGKJCcy1cbRCd7rRyYt8LVbn12tL/exec';
  const today = dateKey();
  const cached = localStorage.getItem('mori_quotes_cache_date');
  const cachedQuotes = localStorage.getItem('mori_quotes_cache');

  if (cached === today && cachedQuotes) {
    QUOTES = JSON.parse(cachedQuotes);
    quotesLoaded = true;
    return;
  }

  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    const words = data.allWords || data.words || data;
    if (words && words.length > 0) {
      QUOTES = words.map(text => ({ text: String(text) }));
      localStorage.setItem('mori_quotes_cache_date', today);
      localStorage.setItem('mori_quotes_cache', JSON.stringify(QUOTES));
    }
    quotesLoaded = true;
  } catch(e) {
    console.error('エラー:', e);
    if (cachedQuotes) {
      QUOTES = JSON.parse(cachedQuotes);
    } else {
      QUOTES = [{ text: "森から、言葉が届きます。" }];
    }
    quotesLoaded = true;
  }
}

function dayIdx() { const d=new Date(); return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000); }
function todayQ() { return QUOTES[dayIdx()%QUOTES.length]; }
function jaDate() { const d=new Date(); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function dateKey() { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function getFavs() { try { return JSON.parse(localStorage.getItem('mori_favs')||'[]'); } catch { return []; } }
function setFavs(f) { localStorage.setItem('mori_favs', JSON.stringify(f)); }
function isFaved() { return getFavs().some(f=>f.text===QUOTES[currentIdx].text); }

let _t;
function pop(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(_t); _t=setTimeout(()=>el.classList.remove('on'),2500);
}

function syncFavBtn() {
  const btn=document.getElementById('fav-btn');
  btn.classList.toggle('fav-on', isFaved());
}
function toggleFav() {
  const q=todayQ(); let favs=getFavs();
  const i=favs.findIndex(f=>f.text===q.text);
  if(i>=0){ favs.splice(i,1); }
  else { favs.unshift({...q,date:dateKey()}); }
  setFavs(favs); syncFavBtn();
}

function openDesc() {
  const q = todayQ();
  if (!q.description) return;
  document.getElementById('desc-text').textContent = q.description;
  document.getElementById('desc-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeDesc() {
  document.getElementById('desc-modal').style.display = 'none';
  document.body.style.overflow = '';
}
function closeDescOutside(e) {
  if (e.target === document.getElementById('desc-modal')) closeDesc();
}

function syncDescBtn() {
  const q = todayQ();
  const btn = document.getElementById('desc-btn');
  if (q.description) btn.classList.add('visible');
  else btn.classList.remove('visible');
}

function showRandomQuote() {
  history.push(currentIdx);
  let newIdx;
  do {
    newIdx = Math.floor(Math.random() * QUOTES.length);
  } while (newIdx === currentIdx && QUOTES.length > 1);
  showQuote(newIdx, 'up');
}

function showPrevQuote() {
  if (history.length > 0) {
    const prevIdx = history.pop();
    showQuote(prevIdx, 'down');
  }
}

async function shareQuote() {
  await shareText(todayQ().text);
}
async function shareFavItem(i) {
  const f = getFavs()[i];
  if (f) await shareText(f.text);
}
async function shareText(text) {
  if (navigator.share) {
    try { await navigator.share({ title: '深呼吸する森', text }); }
    catch(e) { if (e.name !== 'AbortError') copyFallback(text); }
  } else {
    copyFallback(text);
  }
}
function copyFallback(text) {
  navigator.clipboard.writeText(text)
    .then(()=>pop('テキストをコピーしました'))
    .catch(()=>pop('共有できませんでした'));
}

async function saveImg() {
  await saveImgFromText(todayQ().text);
}
async function saveFavItem(i) {
  const f = getFavs()[i];
  if (f) await saveImgFromText(f.text);
}
async function saveImgFromText(text) {
  const isMobile=/iPhone|iPad|Android/i.test(navigator.userAgent);
  try {
    let canvas, dataUrl;
    if (isMobile) {
      document.getElementById('cf-body').textContent=text;
      fitCfText(document.getElementById('cf-body'), document.getElementById('cf'), 1920);
      canvas=await html2canvas(document.getElementById('cf'),{
        scale:1, backgroundColor:'#08130a', useCORS:true, logging:false, width:1080, height:1920, windowWidth:1080
      });
      dataUrl=canvas.toDataURL('image/png');
      showImgModal(dataUrl);
    } else {
      document.getElementById('cf-pc-body').textContent=text;
      fitCfText(document.getElementById('cf-pc-body'), document.getElementById('cf-pc'), 1080);
      canvas=await html2canvas(document.getElementById('cf-pc'),{
        scale:1, backgroundColor:'#08130a', useCORS:true, logging:false, width:1920, height:1080, windowWidth:1920
      });
      dataUrl=canvas.toDataURL('image/png');
      const a=document.createElement('a');
      a.download=`meigen-${dateKey()}.png`; a.href=dataUrl; a.click();
    }
  } catch(e){ pop('保存できませんでした'); }
}

function fitCfText(bodyEl, containerEl, containerHeight) {
  const baseSize = 72;
  const minSize = 32;
  bodyEl.style.fontSize = baseSize + 'px';
  let size = baseSize;
  while (size > minSize) {
    const bodyBottom = bodyEl.getBoundingClientRect().bottom;
    const containerBottom = containerEl.getBoundingClientRect().bottom;
    if (bodyBottom <= containerBottom - 80) break;
    size -= 2;
    bodyEl.style.fontSize = size + 'px';
  }
}

function showImgModal(dataUrl){
  document.getElementById('img-modal').style.display='flex';
  document.getElementById('modal-img').src=dataUrl;
}
function closeImgModal(){
  document.getElementById('img-modal').style.display='none';
}

function toggleMenu() {
  const nav = document.getElementById('menu-nav');
  const btn = document.getElementById('menu-btn');
  const open = nav.classList.toggle('open');
  btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  btn.querySelector('.icon-hamburger').style.display = open ? 'none' : '';
  btn.querySelector('.icon-close').style.display = open ? '' : 'none';
}
function closeMenu() {
  const nav = document.getElementById('menu-nav');
  const btn = document.getElementById('menu-btn');
  nav.classList.remove('open');
  btn.setAttribute('aria-expanded', 'false');
  btn.querySelector('.icon-hamburger').style.display = '';
  btn.querySelector('.icon-close').style.display = 'none';
}
function goFavsFromMenu() {
  closeMenu();
  goFavs();
}

function goFavs() {
  document.getElementById('quote-sec').style.display='none';
  document.getElementById('fav-sec').style.display='flex';
  document.getElementById('fav-tab').classList.add('active');
  document.querySelector('.glass-card').classList.add('fav-mode');
  renderFavs();
}
function goQuote() {
  document.getElementById('fav-sec').style.display='none';
  document.getElementById('quote-sec').style.display='';
  document.getElementById('fav-tab').classList.remove('active');
  document.querySelector('.glass-card').classList.remove('fav-mode');
}

function renderFavs() {
  const list=document.getElementById('fav-list');
  const sec=document.getElementById('fav-sec');
  const favs=getFavs();
  const empty=!favs.length;
  sec.classList.toggle('is-empty', empty);
  if(empty){
    list.innerHTML='';
    return;
  }
  list.innerHTML=favs.map((f,i)=>`
    <div class="fav-item">
      <p class="fav-text">${f.text}</p>
      <div class="fav-item-icons">
        <button class="fav-icon-btn fav-icon-heart" onclick="delFav(${i})" aria-label="お気に入りから削除">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
        <button class="fav-icon-btn" onclick="shareFavItem(${i})" aria-label="共有">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </button>
        <button class="fav-icon-btn" onclick="saveFavItem(${i})" aria-label="画像保存">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>`).join('');
}
function delFav(i) {
  const favs=getFavs(); favs.splice(i,1); setFavs(favs);
  renderFavs(); pop('削除しました');
}

/* ── スワイプ名言管理 ── */
let currentIdx = dayIdx() % QUOTES.length;

function applyQText(te, text) {
  te.textContent = text;
  te.style.fontSize = '';
  requestAnimationFrame(() => fitQText(te));
}

// 本文がアイコン行に被りそうな場合だけ、被らなくなるまで文字サイズを少しずつ縮小する
function fitQText(te) {
  const favBtn = document.getElementById('fav-btn');
  if (!te || !favBtn) return;
  te.style.fontSize = '';
  const baseSize = parseFloat(getComputedStyle(te).fontSize);
  const minSize = baseSize * 0.6;
  const iconTop = favBtn.getBoundingClientRect().top;
  let size = baseSize;
  while (te.getBoundingClientRect().bottom > iconTop - 8 && size > minSize) {
    size -= 1;
    te.style.fontSize = size + 'px';
  }
}

function showQuote(idx, direction) {
  const te = document.getElementById('q-text');
  const ae = document.getElementById('q-author');
  const de = document.getElementById('date-str');
  const ie = document.getElementById('q-indicator');

  // slide out
  const outClass = direction === 'up' ? 'slide-up' : 'slide-down';
  te.classList.remove('show'); te.classList.add(outClass);
  ae.classList.remove('show'); ae.classList.add(outClass);
  de.style.opacity = '0';

  setTimeout(() => {
    currentIdx = (idx + QUOTES.length) % QUOTES.length;
    const q = QUOTES[currentIdx];

    de.textContent = jaDate();
    de.style.opacity = '1';

    applyQText(te, q.text);
    ae.textContent = '';
    te.classList.remove('slide-up','slide-down','show');
    ae.classList.remove('slide-up','slide-down','show');

    requestAnimationFrame(() => {
      te.classList.add('show');
      ae.classList.add('show');
    });

    // sync fav button
    syncFavBtn();
    syncDescBtn();
  }, 350);
}

function todayQ() { return QUOTES[currentIdx] || { text: "" }; }

function getOrSetTodayIndex() {
  const today = dateKey();
  const savedDate = localStorage.getItem('mori_today_date');
  const savedIdx = localStorage.getItem('mori_today_idx');

  if (savedDate === today && savedIdx !== null && QUOTES.length > 0) {
    return parseInt(savedIdx);
  }

  // 新しいランダムインデックスを選択
  const newIdx = Math.floor(Math.random() * QUOTES.length);
  localStorage.setItem('mori_today_date', today);
  localStorage.setItem('mori_today_idx', String(newIdx));
  return newIdx;
}



(async function(){
  document.getElementById('date-str').textContent = jaDate();
  await loadQuotes();
  currentIdx = getOrSetTodayIndex();
  const q = todayQ();
  const te = document.getElementById('q-text');
  const ae = document.getElementById('q-author');
  setTimeout(() => {
    applyQText(te, q.text);
    ae.textContent = '';
    requestAnimationFrame(() => { te.classList.add('show'); ae.classList.add('show'); });
  }, 300);
  syncFavBtn(); syncDescBtn();

  // ローディング画面を非表示
  const loadingScreen = document.getElementById('loading-screen');
  loadingScreen.classList.add('hidden');
  setTimeout(() => loadingScreen.style.display = 'none', 800);

  window.addEventListener('resize', () => requestAnimationFrame(() => {
    fitQText(document.getElementById('q-text'));
  }));
})();
</script>
