* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {

  overflow-x: hidden;

}

/* ── 森の背景レイヤー ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 30% 60% at 15% 0%,  rgba(120,180,60,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 20% 50% at 75% 0%,  rgba(100,160,40,0.10) 0%, transparent 65%),
    radial-gradient(ellipse 15% 40% at 45% 5%,  rgba(140,200,70,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 25% 55% at 88% 10%, rgba(90,150,30,0.09) 0%, transparent 65%),
    radial-gradient(ellipse 100% 40% at 50% 100%, rgba(4,10,5,0.9) 0%, transparent 80%),
    radial-gradient(ellipse 80% 30% at 50% 80%,  rgba(10,25,12,0.7) 0%, transparent 70%),
    linear-gradient(180deg, #0a1a0c 0%, #0d2010 40%, #0a1a0c 70%, #060e07 100%);
  pointer-events: none;
}

/* ── 霧のアニメーション ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 120% 25% at 50% 88%, rgba(180,220,160,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 80% 15% at 30% 75%, rgba(160,210,140,0.03) 0%, transparent 50%);
  animation: mistDrift 18s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes mistDrift {
  0%   { transform: translateX(-15px) translateY(0); opacity: 0.8; }
  100% { transform: translateX(15px)  translateY(-8px); opacity: 1; }
}

.light-particles {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--particle-color);
  border-radius: 50%;
  animation: float linear infinite;
}

@keyframes float {
  0%   { transform: translateY(0) translateX(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-80vh) translateX(20px); opacity: 0; }
}

#app {
  position: relative; z-index: 1;
  height: 100dvh;
  display: flex;
  padding: 4.51dvh 6.71vw;
  color: #d6eacc;
}

/* ── ガラスカード（Figmaデザインに準拠した絶対配置レイアウト） ── */
.glass-card {
  position: relative;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 5.28vw;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* ── メニューボタン ── */
.menu-btn {
  position: absolute;
  top: 2.83%; right: 16.95%;
  width: 9.17vw; height: 9.17vw;
  max-width: 36px; max-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: rgba(255,255,255,0.9);
  cursor: pointer;
  padding: 0;
  transition: color 0.3s;

}
.menu-btn svg { width: 100%; height: 100%; }
.menu-btn:hover, .menu-btn.active { color: #fff; }
.menu-badge {

}

/* ── Quote section ── */
.date-str {

  top: 23.2%; left: 0; right: 0;
  text-align: center;

  letter-spacing: 0.4em;
  color: rgba(255,255,255,0.5);
}

#q-card {

}

/* 名言テキスト — くっきり・大きく */
#q-text {

  line-height: 1.965;

}
#q-text.show { opacity: 1; transform: none; }

/* 著者 */

}

/* ── Controls（お気に入り／共有／保存） ── */

  background: rgba(255,255,255,0.16);
}
.icon-circle.fav-on {

  border-color: rgba(168,224,96,0.6);
  background: rgba(80,140,50,0.18);
}
#fav-btn { left: 17.06%; }
#share-btn { left: 42.78%; }
#save-btn { left: 68.5%; }

/* ── カードフッター ── */

  top: 91.5%; left: 0; right: 0;

@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.desc-box {

/* ── ローディングアニメーション ── */
#loading-screen {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse 30% 60% at 15% 0%,  rgba(120,180,60,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 20% 50% at 75% 0%,  rgba(100,160,40,0.10) 0%, transparent 65%),
    #0a1a0c;
  transition: opacity 0.8s ease;
}
#loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}
.loading-circle {
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 50%;
  border: 1px solid rgba(200,230,170,0.45);
  transform: translate(-50%, -50%) scale(0.9);
  animation: loadingBreathe 4s ease-in-out infinite;
}
.loading-circle--1 {
  width: 33vmin; height: 33vmin;
  animation-delay: 0s;
  border-color: rgba(220,240,190,0.6);
}
.loading-circle--2 {
  width: 50vmin; height: 50vmin;
  animation-delay: 0.3s;
  border-color: rgba(200,230,170,0.4);
}
.loading-circle--3 {
  width: 72vmin; height: 72vmin;
  animation-delay: 0.6s;
  border-color: rgba(180,220,150,0.22);
}
@keyframes loadingBreathe {
  0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
}
.breath-text {
  position: relative;
  z-index: 1;
  writing-mode: vertical-rl;
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(1.3rem, 6vmin, 1.8rem);
  line-height: 1.9;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.5);
  text-align: center;
  animation: breatheText 4s ease-in-out infinite;
}
@keyframes breatheText {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 0.7; }
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(8,20,9,0.92);
  border: 1px solid rgba(100,170,60,0.3);
  color: #c8e8a8;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 0.64rem; letter-spacing: 0.28em;
  padding: 12px 28px; opacity: 0;
  pointer-events: none;
  transition: all 0.35s ease;
  z-index: 100; white-space: nowrap;
  backdrop-filter: blur(8px);
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Capture frame (壁紙サイズ 1080x1920) ── */
#cf {
  position: fixed; left: -9999px; top: 0;
  width: 1080px;
  height: 1920px;
  background: #08130a;

.cf-inner {

}
.cf-name { font-size: 1.1rem; letter-spacing: 0.62em; color: rgba(140,195,100,0.5); margin-bottom: 60px; font-family: 'Shippori Mincho B1', serif; }

.cf-by { font-size: 1.1rem; letter-spacing: 0.5em; color: rgba(140,195,100,0.6); font-family: 'Shippori Mincho B1', serif; }

<script>
/* ── 光の粒を生成 ── */
(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = (60 + Math.random() * 40) + 'vh';
    p.style.width = p.style.height = (1 + Math.random() * 2.5) + 'px';
    p.style.animationDuration = (12 + Math.random() * 20) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.opacity = 0;
    container.appendChild(p);
  }
})();

/* ── Quotes ── */
let QUOTES = [];
let quotesLoaded = false;
let history = [];

async function loadQuotes() {
  const GAS_URL = 'https://script.google.com/macros/s/AKfycby3Lxzf7bo_lFlYSpMmO2g6s9RQ6O4fm1dU9Z6lpGKJCcy1cbRCd7rRyYt8LVbn12tL/exec';
  const today = dateKey();
  const cached = localStorage.getItem('mori_quotes_cache_date');
  const cachedQuotes = localStorage.getItem('mori_quotes_cache');

  if (cached === today && cachedQuotes) {
    QUOTES = JSON.parse(cachedQuotes);
    quotesLoaded = true;
    return;
  }

  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    const words = data.allWords || data.words || data;
    if (words && words.length > 0) {
      QUOTES = words.map(text => ({ text: String(text) }));
      localStorage.setItem('mori_quotes_cache_date', today);
      localStorage.setItem('mori_quotes_cache', JSON.stringify(QUOTES));
    }
    quotesLoaded = true;
  } catch(e) {
    console.error('エラー:', e);
    if (cachedQuotes) {
      QUOTES = JSON.parse(cachedQuotes);
    } else {
      QUOTES = [{ text: "森から、言葉が届きます。" }];
    }
    quotesLoaded = true;
  }
}

function dayIdx() { const d=new Date(); return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000); }
function todayQ() { return QUOTES[dayIdx()%QUOTES.length]; }
function jaDate() { const d=new Date(); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function dateKey() { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function getFavs() { try { return JSON.parse(localStorage.getItem('mori_favs')||'[]'); } catch { return []; } }
function setFavs(f) { localStorage.setItem('mori_favs', JSON.stringify(f)); }
function isFaved() { return getFavs().some(f=>f.text===QUOTES[currentIdx].text); }

let _t;
function pop(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(_t); _t=setTimeout(()=>el.classList.remove('on'),2500);
}

function syncFavBtn() {
  const btn=document.getElementById('fav-btn');
  if(isFaved()){ btn.classList.add('fav-on'); btn.innerHTML='♥'; }
  else { btn.classList.remove('fav-on'); btn.innerHTML='♡'; }
}
function syncBadge() {
  const c=getFavs().length;
  document.getElementById('badge').textContent=c>0?` (${c})`:'';
}

function toggleFav() {
  const q=todayQ(); let favs=getFavs();
  const i=favs.findIndex(f=>f.text===q.text);
  if(i>=0){ favs.splice(i,1); pop('お気に入りから削除しました'); }
  else { favs.unshift({...q,date:dateKey()}); pop('お気に入りに追加しました'); }
  setFavs(favs); syncFavBtn(); syncBadge();
}

function openDesc() {
  const q = todayQ();
  if (!q.description) return;
  document.getElementById('desc-text').textContent = q.description;
  document.getElementById('desc-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeDesc() {
  document.getElementById('desc-modal').style.display = 'none';
  document.body.style.overflow = '';
}
function closeDescOutside(e) {
  if (e.target === document.getElementById('desc-modal')) closeDesc();
}

function syncDescBtn() {
  const q = todayQ();
  const btn = document.getElementById('desc-btn');
  if (q.description) btn.classList.add('visible');
  else btn.classList.remove('visible');
}

function showRandomQuote() {
  history.push(currentIdx);
  let newIdx;
  do {
    newIdx = Math.floor(Math.random() * QUOTES.length);
  } while (newIdx === currentIdx && QUOTES.length > 1);
  showQuote(newIdx, 'up');
}

function showPrevQuote() {
  if (history.length > 0) {
    const prevIdx = history.pop();
    showQuote(prevIdx, 'down');
  }
}

async function shareQuote() {
  const q = todayQ();
  const text = q.text;
  if (navigator.share) {
    try { await navigator.share({ title: '深呼吸をする森', text }); }
    catch(e) { if (e.name !== 'AbortError') copyFallback(text); }
  } else {
    copyFallback(text);
  }
}
function copyFallback(text) {
  navigator.clipboard.writeText(text)
    .then(()=>pop('テキストをコピーしました'))
    .catch(()=>pop('共有できませんでした'));
}

async function saveImg() {
  pop('画像を生成しています...');
  const q=todayQ();
  document.getElementById('cf-body').textContent=q.text;
  try {
    const canvas=await html2canvas(document.getElementById('cf'),{
      scale:1, backgroundColor:'#08130a', useCORS:true, logging:false, width:1080, height:1920, windowWidth:1080
    });
    const dataUrl=canvas.toDataURL('image/png');
    // スマホ判定
    const isMobile=/iPhone|iPad|Android/i.test(navigator.userAgent);
    if(isMobile){
      // モーダルで画像を表示して長押し保存を促す
      showImgModal(dataUrl);
    } else {
      const a=document.createElement('a');
      a.download=`meigen-${dateKey()}.png`; a.href=dataUrl; a.click();
      pop('画像を保存しました');
    }
  } catch(e){ pop('保存できませんでした'); }
}

function showImgModal(dataUrl){
  document.getElementById('img-modal').style.display='flex';
  document.getElementById('modal-img').src=dataUrl;
}
function closeImgModal(){
  document.getElementById('img-modal').style.display='none';
}

function goFavs() {
  document.getElementById('quote-sec').style.display='none';
  document.getElementById('fav-sec').style.display='flex';
  document.getElementById('fav-tab').classList.add('active');
  renderFavs();
}
function goQuote() {
  document.getElementById('fav-sec').style.display='none';
  document.getElementById('quote-sec').style.display='';
  document.getElementById('fav-tab').classList.remove('active');
}
function toggleFavSection() {
  const isShowing = document.getElementById('fav-sec').style.display === 'flex';
  if (isShowing) goQuote(); else goFavs();
}

function renderFavs() {
  const list=document.getElementById('fav-list');
  const favs=getFavs();
  if(!favs.length){
    list.innerHTML='<div class="fav-empty">まだお気に入りはありません。<br>今日の名言から保存してみましょう。</div>';
    return;
  }
  list.innerHTML=favs.map((f,i)=>`
    <div class="fav-item">
      <button class="fav-del" onclick="delFav(${i})">✕</button>
      <p class="fav-text">${f.text}</p>

    </div>`).join('');
}
function delFav(i) {
  const favs=getFavs(); favs.splice(i,1); setFavs(favs);
  syncBadge(); renderFavs(); pop('削除しました');
}

/* ── スワイプ名言管理 ── */
let currentIdx = dayIdx() % QUOTES.length;

function showQuote(idx, direction) {
  const te = document.getElementById('q-text');
  const ae = document.getElementById('q-author');
  const de = document.getElementById('date-str');
  const ie = document.getElementById('q-indicator');

  // slide out
  const outClass = direction === 'up' ? 'slide-up' : 'slide-down';
  te.classList.remove('show'); te.classList.add(outClass);
  ae.classList.remove('show'); ae.classList.add(outClass);
  de.style.opacity = '0';

  setTimeout(() => {
    currentIdx = (idx + QUOTES.length) % QUOTES.length;
    const q = QUOTES[currentIdx];

    de.textContent = jaDate();
    de.style.opacity = '1';

    te.textContent = q.text;
    ae.textContent = '';
    te.classList.remove('slide-up','slide-down','show');
    ae.classList.remove('slide-up','slide-down','show');

    requestAnimationFrame(() => {
      te.classList.add('show');
      ae.classList.add('show');
    });

    // sync fav button
    syncFavBtn();
    syncDescBtn();
  }, 350);
}

function todayQ() { return QUOTES[currentIdx] || { text: "" }; }

function getOrSetTodayIndex() {
  const today = dateKey();
  const savedDate = localStorage.getItem('mori_today_date');
  const savedIdx = localStorage.getItem('mori_today_idx');

  if (savedDate === today && savedIdx !== null && QUOTES.length > 0) {
    return parseInt(savedIdx);
  }

  // 新しいランダムインデックスを選択
  const newIdx = Math.floor(Math.random() * QUOTES.length);
  localStorage.setItem('mori_today_date', today);
  localStorage.setItem('mori_today_idx', String(newIdx));
  return newIdx;
}



(async function(){
  document.getElementById('date-str').textContent = jaDate();
  await loadQuotes();
  currentIdx = getOrSetTodayIndex();
  const q = todayQ();
  const te = document.getElementById('q-text');
  const ae = document.getElementById('q-author');
  setTimeout(() => {
    te.textContent = q.text;
    ae.textContent = '';
    requestAnimationFrame(() => { te.classList.add('show'); ae.classList.add('show'); });
  }, 300);
  syncFavBtn(); syncBadge(); syncDescBtn();

  // ローディング画面を非表示
  const loadingScreen = document.getElementById('loading-screen');
  loadingScreen.classList.add('hidden');
  setTimeout(() => loadingScreen.style.display = 'none', 800);
})();

/* ── スワイプで名言ナビゲーション ── */
(function(){
  const card = document.getElementById('glass-card');
  let startX = 0, startY = 0;
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  card.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) showRandomQuote(); else showPrevQuote();
    }
  }, { passive: true });
})();
</script>
