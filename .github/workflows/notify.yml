name: 毎朝8時に通知

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: OneSignalに通知を送る
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_API_KEY }}" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "included_segments": ["Total Subscriptions"],
              "headings": {"en": "深呼吸をする森"},
              "contents": {"en": "森から、今日の言葉が届きました。"},
              "url": "https://chiaki-mil.github.io/shinkokyuu-mori/"
            }' \
            https://onesignal.com/api/v1/notifications
